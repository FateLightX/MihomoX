name: delete-workflow-runs
# mihomox-actions-index: force workflow registration

on:
  workflow_dispatch:

jobs:
  delete:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: delete
        uses: Mattraks/delete-workflow-runs@0cf693bc9909e5e867ee8f27b813224ba862939c # v2
        with:
          retain_days: 3
          keep_minimum_runs: 0
